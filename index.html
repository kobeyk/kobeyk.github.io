<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Appleyk's 作品集展示</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2306d6a0'/%3E%3Cstop offset='100%25' style='stop-color:%2338bdf8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='46' font-family='system-ui' font-size='26' font-weight='900' fill='%23030712' text-anchor='middle'%3EYK%3C/text%3E%3C/svg%3E">
  <style>
    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', sans-serif;
      background: #030712;
      color: #e2e8f0;
      overflow-x: hidden;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: #030712
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #06d6a0, #38bdf8);
      border-radius: 3px
    }

    /* ===== CANVAS BACKGROUND ===== */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      z-index: 1;
      min-height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 24px 56px;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(6, 214, 160, 0.07) 0%, rgba(56, 189, 248, 0.03) 35%, transparent 70%);
      pointer-events: none;
      animation: breathe 8s ease-in-out infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.8
      }

      50% {
        transform: translate(-50%, -50%) scale(1.15);
        opacity: 1
      }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 960px
    }

    /* Platform badge */
    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 20px;
      border-radius: 100px;
      border: 1px solid rgba(6, 214, 160, 0.22);
      background: rgba(6, 214, 160, 0.05);
      color: #06d6a0;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      margin-bottom: 36px;
      backdrop-filter: blur(8px);
    }

    .platform-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #06d6a0;
      animation: ping 2s ease-in-out infinite;
    }

    @keyframes ping {

      0%,
      100% {
        box-shadow: 0 0 8px #06d6a0, 0 0 24px rgba(6, 214, 160, 0.4)
      }

      50% {
        box-shadow: 0 0 16px #06d6a0, 0 0 40px rgba(6, 214, 160, 0.7)
      }
    }

    /* Big title */
    .hero h1 {
      font-size: clamp(3.2rem, 7vw, 5.6rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }

    .hero h1 .line1 {
      display: block;
      background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 40px rgba(56, 189, 248, 0.15));
    }

    .hero h1 .line2 {
      display: block;
      font-size: 0.75em;
      background: linear-gradient(135deg, #06d6a0 0%, #38bdf8 40%, #a78bfa 75%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 50px rgba(6, 214, 160, 0.3));
      animation: shimmer 4s ease-in-out infinite;
      background-size: 200% 100%;
    }

    @keyframes shimmer {

      0%,
      100% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }
    }

    .hero-desc {
      font-size: 1.15rem;
      color: #94a3b8;
      max-width: 600px;
      margin: 0 auto 44px;
      line-height: 1.75;
    }

    .hero-stats {
      display: flex;
      gap: 56px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center
    }

    .hero-stat .num {
      font-size: 2.6rem;
      font-weight: 900;
      background: linear-gradient(180deg, #e2e8f0, #64748b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-stat .label {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 2px;
      letter-spacing: 0.04em
    }

    /* ===== VIDEO SHOWCASE ===== */
    .video-showcase {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    .video-card {
      position: relative;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(6, 214, 160, 0.15);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 80px -20px rgba(6, 214, 160, 0.12),
        0 30px 80px -30px rgba(0, 0, 0, 0.5);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .video-card:hover {
      border-color: rgba(6, 214, 160, 0.3);
      box-shadow: 0 0 100px -15px rgba(6, 214, 160, 0.18),
        0 40px 100px -30px rgba(0, 0, 0, 0.55);
    }

    .video-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      z-index: -1;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(6, 214, 160, 0.18), rgba(56, 189, 248, 0.12), rgba(167, 139, 250, 0.08));
      opacity: 0.6;
      animation: videoGlow 4s ease-in-out infinite;
    }

    @keyframes videoGlow {

      0%,
      100% {
        opacity: 0.45
      }

      50% {
        opacity: 0.8
      }
    }

    .video-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 24px 28px 0;
    }

    .video-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px;
      border-radius: 100px;
      background: rgba(6, 214, 160, 0.1);
      border: 1px solid rgba(6, 214, 160, 0.2);
      color: #06d6a0;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      animation: pulse-badge 2.5s ease-in-out infinite;
    }

    @keyframes pulse-badge {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(6, 214, 160, 0.25)
      }

      50% {
        box-shadow: 0 0 0 12px rgba(6, 214, 160, 0)
      }
    }

    .video-badge .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: livePulse 1.2s ease-in-out infinite;
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px #ef4444
      }

      50% {
        opacity: 0.4;
        box-shadow: 0 0 12px #ef4444
      }
    }

    .video-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.01em;
    }

    .video-subtitle {
      font-size: 0.92rem;
      color: #94a3b8
    }

    .video-body {
      padding: 16px 28px 28px
    }

    .video-body video {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.1);
      background: #000;
      box-shadow: 0 4px 40px -8px rgba(0, 0, 0, 0.4);
      outline: none;
    }

    .video-body video:focus {
      outline: none
    }

    /* ===== PROJECT SWITCHER ===== */
    .project-switcher {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 0 24px 48px;
    }

    .project-switcher-inner {
      display: flex;
      gap: 4px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.1);
      border-radius: 100px;
      padding: 5px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
    }

    .project-switcher-inner::after {
      content: '';
      position: absolute;
      top: 5px;
      bottom: 5px;
      left: 5px;
      width: calc(50% - 5px);
      background: linear-gradient(135deg, rgba(6, 214, 160, 0.18), rgba(56, 189, 248, 0.1));
      border-radius: 100px;
      border: 1px solid rgba(6, 214, 160, 0.2);
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      z-index: 0;
    }

    .project-switcher-inner.right::after {
      transform: translateX(100%);
    }

    .project-tab {
      position: relative;
      z-index: 1;
      padding: 12px 28px;
      border-radius: 100px;
      border: none;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: color 0.35s, text-shadow 0.35s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .project-tab.active {
      color: #e2e8f0;
      text-shadow: 0 0 20px rgba(6, 214, 160, 0.3);
    }

    .project-tab:hover:not(.active) {
      color: #94a3b8
    }

    .project-tab .tab-icon {
      font-size: 1.1rem
    }

    .project-tab .tab-label-mobile {
      display: none
    }

    /* ===== ECO CAROUSEL ===== */
    .eco-carousel {
      position: relative;
      z-index: 1;
      width: 80%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px 0 200px;
      min-height: 440px;
    }

    .eco-slide {
      display: none;
      animation: fadeSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .eco-slide.active {
      display: block
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateX(30px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    .eco-slide-header {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .eco-slide-icon {
      font-size: 1.6rem;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(6, 214, 160, 0.08);
      border: 1px solid rgba(6, 214, 160, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .eco-slide-title-wrap {
      text-align: center
    }

    .eco-slide-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.01em;
    }

    .eco-slide-desc {
      font-size: 0.85rem;
      color: #64748b;
    }

    .eco-slide-counter {
      font-size: 0.78rem;
      color: #475569;
      letter-spacing: 0.04em;
    }

    /* Image layouts */
    .eco-slide-body {
      display: flex;
      gap: 14px;
      align-items: stretch;
    }

    .eco-slide-body.count-1 {
      justify-content: center
    }

    .eco-slide-body.count-2 {
      justify-content: center
    }

    .eco-slide-body.count-3 {
      display: flex;
      flex-direction: row;
      gap: 12px;
      justify-content: center;
    }

    .eco-slide-body.count-3 .eco-img-card {
      flex: 1;
      min-width: 0;
      max-width: 32%;
      aspect-ratio: 16/10;
      max-height: 240px;
    }

    .eco-img-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(56, 189, 248, 0.08);
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      flex: 1;
      min-width: 0;
      aspect-ratio: 16/10;
      max-height: 380px;
    }

    .eco-img-card:hover {
      transform: translateY(-3px);
      border-color: rgba(56, 189, 248, 0.25);
      box-shadow: 0 16px 48px -16px rgba(6, 214, 160, 0.1);
    }

    .eco-img-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .eco-img-card:hover img {
      transform: scale(1.03)
    }

    .eco-img-card .eco-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(3, 7, 18, 0.8));
      display: flex;
      align-items: flex-end;
      padding: 10px 14px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .eco-img-card:hover .eco-img-overlay {
      opacity: 1
    }

    .eco-img-overlay span {
      font-size: 0.75rem;
      color: #e2e8f0;
      background: rgba(3, 7, 18, 0.55);
      padding: 4px 10px;
      border-radius: 6px;
    }

    .count-1 .eco-img-card {
      max-width: 60%
    }

    .count-2 .eco-img-card {
      max-width: 42%
    }

    /* Nav arrows — inline with header */
    .eco-nav-inline {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(6, 214, 160, 0.06);
      border: 1.5px solid rgba(6, 214, 160, 0.2);
      color: #06d6a0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      flex-shrink: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: inherit;
      line-height: 1;
      position: relative;
    }

    .eco-nav-inline::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: transparent;
      box-shadow: 0 0 0 0 rgba(6, 214, 160, 0);
      transition: box-shadow 0.3s;
    }

    .eco-nav-inline:hover {
      background: rgba(6, 214, 160, 0.18);
      border-color: rgba(6, 214, 160, 0.5);
      color: #f1f5f9;
      transform: scale(1.08);
      box-shadow: 0 0 28px rgba(6, 214, 160, 0.25), inset 0 0 16px rgba(6, 214, 160, 0.06);
    }

    .eco-nav-inline:hover::after {
      box-shadow: 0 0 20px 6px rgba(6, 214, 160, 0.18);
    }

    .eco-nav-inline:active {
      transform: scale(0.94);
      transition: transform 0.12s;
    }

    .eco-nav-inline.hidden {
      opacity: 0.2;
      pointer-events: none;
      border-color: rgba(255, 255, 255, 0.04);
      color: #475569;
      background: rgba(15, 23, 42, 0.3);
    }

    /* Dots */
    .eco-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .eco-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: all 0.3s;
    }

    .eco-dot.active {
      background: #06d6a0;
      border-color: #06d6a0;
      box-shadow: 0 0 10px rgba(6, 214, 160, 0.4);
      width: 24px;
      border-radius: 100px;
    }

    /* ===== PROJECT PANELS ===== */
    .project-panel {
      display: none;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .project-panel.active {
      display: block;
      opacity: 1;
      padding-bottom: 160px;
    }

    /* ===== FOOTER ===== */
    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      color: #64748b;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    .footer span {
      background: linear-gradient(135deg, #06d6a0, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===== SCROLL PROMPT — BIG & OBVIOUS ===== */
    .scroll-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 2;
      margin-top: 36px;
      animation: float-updown 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float-updown {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(12px)
      }
    }

    .scroll-prompt .ring-outer {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(6, 214, 160, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse-ring 2.4s ease-in-out infinite;
    }

    @keyframes pulse-ring {

      0%,
      100% {
        border-color: rgba(6, 214, 160, 0.2);
        box-shadow: 0 0 0 0 rgba(6, 214, 160, 0.15)
      }

      50% {
        border-color: rgba(6, 214, 160, 0.5);
        box-shadow: 0 0 0 16px rgba(6, 214, 160, 0)
      }
    }

    .scroll-prompt .chevron {
      width: 16px;
      height: 16px;
      border-right: 2.5px solid #06d6a0;
      border-bottom: 2.5px solid #06d6a0;
      transform: rotate(45deg);
      animation: sink 1.2s ease-in-out infinite;
    }

    @keyframes sink {

      0%,
      100% {
        opacity: 0.3;
        transform: rotate(45deg) translateY(-4px)
      }

      50% {
        opacity: 1;
        transform: rotate(45deg) translateY(4px)
      }
    }

    .scroll-prompt .label {
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      color: #475569;
    }

    /* ===== SECTION ===== */
    .section {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 100px 24px;
    }

    .section-header {
      margin-bottom: 52px
    }

    .section-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: #06d6a0;
      margin-bottom: 10px;
    }

    .section-eyebrow::before {
      content: '';
      width: 28px;
      height: 1px;
      background: rgba(6, 214, 160, 0.35);
    }

    .section-header h2 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .section-header .subtitle {
      color: #64748b;
      font-size: 0.92rem;
      margin-top: 6px
    }

    /* ===== MODULE GRID ===== */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
    }

    .module-card {
      position: relative;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(56, 189, 248, 0.07);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .module-card:hover {
      transform: translateY(-5px);
      border-color: rgba(56, 189, 248, 0.22);
      box-shadow: 0 20px 60px -20px rgba(6, 214, 160, 0.1),
        0 0 0 1px rgba(56, 189, 248, 0.08) inset;
    }

    .module-card .card-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      overflow: hidden;
      background: rgba(3, 7, 18, 0.5);
    }

    .module-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .module-card:hover img {
      transform: scale(1.04)
    }

    .module-card .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 55%, rgba(3, 7, 18, 0.85));
      display: flex;
      align-items: flex-end;
      padding: 16px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .module-card:hover .card-overlay {
      opacity: 1
    }

    .card-overlay .zoom-badge {
      padding: 6px 14px;
      border-radius: 6px;
      background: rgba(3, 7, 18, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.78rem;
      color: #e2e8f0;
    }

    .module-card .card-body {
      padding: 14px 18px 18px
    }

    .module-card .card-module {
      font-size: 0.68rem;
      letter-spacing: 0.05em;

      if (projIdx === 0) {
        // Project 0: Grid layout
        IMG_BASE = proj.imgBase;
        const mods = proj.modules;
        const imgs = mods.flatMap(m => m.images.map(i => ({ ...i, module: m.name, moduleId: m.id, projIdx })));
        allImages = allImages.concat(imgs);
        mods.forEach((mod, idx) => {
          const sec = document.createElement('section');
          sec.className = 'section reveal';
          sec.id = 'section-' + mod.id;
          const isFirst = idx === 0;
          sec.innerHTML = `
    <div class="section-header">
      <div class="section-eyebrow">${mod.icon}  Module ${String(idx + 1).padStart(2, '0')}</div>
      <h2>${mod.name}</h2>
      <p class="subtitle">${mod.desc}</p>
    </div>
    <div class="module-grid">
      ${mod.images.map((img, i) => {
            const gIdx = allImages.findIndex(x => x.file === img.file && x.moduleId === mod.id);
            if (isFirst && i === 0) {
              return `<div class="module-card feature-card" data-idx="${gIdx}">
            <div class="card-thumb"><img src="${IMG_BASE + img.file}" alt="${img.name}" loading="lazy">
            <div class="card-overlay"><span class="zoom-badge">🔍 点击查看大图</span></div></div>
            <div class="card-body"><div class="card-module">${mod.name}</div>
            <div class="card-title">${img.name}</div><div class="card-desc">${mod.desc}</div></div></div>`;
            }
            return `<div class="module-card" data-idx="${gIdx}">
          <div class="card-thumb"><img src="${IMG_BASE + img.file}" alt="${img.name}" loading="lazy">
          <div class="card-overlay"><span class="zoom-badge">🔍 点击查看大图</span></div></div>
          <div class="card-body"><div class="card-module">${mod.name}</div><div class="card-title">${img.name}</div></div></div>`;
          }).join('')}
    </div>`;
          main.appendChild(sec);
        });
        main.querySelectorAll('.reveal').forEach(el => obs.observe(el));

      } else {
        // Project 1: Carousel layout
        IMG_BASE = proj.imgBase;
        const slides = proj.slides;
        const imgs = slides.flatMap((s, si) => s.images.map(i => ({ ...i, module: s.title, moduleId: 'eco' + si, projIdx })));
        allImages = allImages.concat(imgs);

        // Build carousel HTML
        let html = '<div class="eco-carousel-inner">';
        slides.forEach((slide, si) => {
          const count = slide.images.length;
          html += `<div class="eco-slide${si === 0 ? ' active' : ''}" data-slide="${si}">
            <div class="eco-slide-header">
              <button class="eco-nav-inline eco-nav-prev" data-dir="-1" aria-label="上一张">←</button>
              <div class="eco-slide-icon">${slide.icon}</div>
              <div class="eco-slide-title-wrap"><div class="eco-slide-title">${slide.title}</div>
              <div class="eco-slide-desc">${slide.desc}</div></div>
              <div class="eco-slide-counter">${si + 1} / ${slides.length}</div>
              <button class="eco-nav-inline eco-nav-next" data-dir="1" aria-label="下一张">→</button>
            </div>
            <div class="eco-slide-body count-${count}">`;
          slide.images.forEach(img => {
            const gIdx = allImages.findIndex(x => x.file === img.file && x.moduleId === 'eco' + si);
            html += `<div class="eco-img-card" data-idx="${gIdx}">
              <img src="${IMG_BASE + img.file}" alt="${img.name}" loading="lazy">
              <div class="eco-img-overlay"><span>🔍 ${img.name}</span></div>
            </div>`;
          });
          html += '</div></div>';
        });
        html += '</div>';

        // Dots
        html += '<div class="eco-dots">';
        slides.forEach((_, si) => {
          html += `<div class="eco-dot${si === 0 ? ' active' : ''}" data-dot="${si}"></div>`;
        });
        html += '</div>';

        main.innerHTML = html;

        // Cache refs
        ecoCarousel = main;
        ecoSlides = main.querySelectorAll('.eco-slide');
        ecoDots = main.querySelectorAll('.eco-dot');
        ecoCurrentSlide = 0;

        // Nav events — delegated from inline arrows
        main.addEventListener('click', e => {
          const btn = e.target.closest('.eco-nav-inline');
          if (!btn) return;
          const dir = parseInt(btn.dataset.dir);
          if (!isNaN(dir)) ecoGoTo(ecoCurrentSlide + dir);
        });
        // Initial arrow state
        updateEcoArrows();
        ecoDots.forEach(d => {
          d.addEventListener('click', () => ecoGoTo(parseInt(d.dataset.dot)));
        });

        // Keyboard nav when panel is active
        main.setAttribute('tabindex', '0');
        main.addEventListener('keydown', e => {
          if (lb.classList.contains('open')) return;
          if (e.key === 'ArrowLeft') ecoGoTo(ecoCurrentSlide - 1);
          if (e.key === 'ArrowRight') ecoGoTo(ecoCurrentSlide + 1);
        });
      }
    }

    function updateEcoArrows() {
      if (!ecoSlides) return;
      const total = ecoSlides.length;
      ecoSlides.forEach((slide, i) => {
        const prev = slide.querySelector('.eco-nav-prev');
        const next = slide.querySelector('.eco-nav-next');
        if (prev) prev.classList.toggle('hidden', i === 0);
        if (next) next.classList.toggle('hidden', i === total - 1);
      });
    }

    function ecoGoTo(idx) {
      if (!ecoSlides || !ecoDots) return;
      const total = ecoSlides.length;
      if (idx < 0) idx = total - 1;
      if (idx >= total) idx = 0;
      ecoSlides[ecoCurrentSlide].classList.remove('active');
      ecoDots[ecoCurrentSlide].classList.remove('active');
      ecoSlides[idx].classList.add('active');
      ecoDots[idx].classList.add('active');
      ecoCurrentSlide = idx;
      // Update counter
      const counter = ecoSlides[idx].querySelector('.eco-slide-counter');
      if (counter) counter.textContent = `${idx + 1} / ${total}`;
      updateEcoArrows();
    }

    // Build both projects upfront
    buildProject(0); buildProject(1);

    // ===== LIGHTBOX =====
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbModule = document.getElementById('lbModule');
    const lbTitle = document.getElementById('lbTitle');
    const lbCounter = document.getElementById('lbCounter');
    let lbIdx = 0;

    function getActiveImages() {
      return allImages.filter(img => img.projIdx === currentProject);
    }
    function openLb(idx) {
      lbIdx = idx;
      const imgs = getActiveImages();
      const img = imgs[idx];
      lbImg.src = projects[currentProject].imgBase + img.file; lbImg.alt = img.name;
      lbModule.textContent = img.module; lbTitle.textContent = img.name;
      lbCounter.textContent = `${idx + 1} / ${imgs.length}`;
      lb.classList.add('open'); document.body.style.overflow = 'hidden';
    }
    function closeLb() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    function navLb(d) {
      const imgs = getActiveImages();
      lbIdx = (lbIdx + d + imgs.length) % imgs.length;
      const img = imgs[lbIdx];
      lbImg.src = projects[currentProject].imgBase + img.file; lbImg.alt = img.name;
      lbModule.textContent = img.module; lbTitle.textContent = img.name;
      lbCounter.textContent = `${lbIdx + 1} / ${imgs.length}`;
    }

    document.getElementById('lbClose').addEventListener('click', closeLb);
    document.getElementById('lbPrev').addEventListener('click', () => navLb(-1));
    document.getElementById('lbNext').addEventListener('click', () => navLb(1));
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

    // Delegate click on both main containers (module-card + eco-img-card)
    mainEls.forEach(m => {
      m.addEventListener('click', e => {
        const card = e.target.closest('.module-card, .eco-img-card');
        if (!card) return;
        const idx = parseInt(card.dataset.idx);
        if (!isNaN(idx)) {
          const img = allImages[idx];
          const imgs = getActiveImages();
          const localIdx = imgs.findIndex(x => x.file === img.file && x.moduleId === img.moduleId);
          if (localIdx >= 0) openLb(localIdx);
        }
      });
    });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLb();
      if (e.key === 'ArrowLeft') navLb(-1);
      if (e.key === 'ArrowRight') navLb(1);
    });

    // ===== PROJECT SWITCHER =====
    const switcherInner = document.getElementById('switcherInner');
    const tabBtns = document.querySelectorAll('.project-tab');

    function switchProject(idx) {
      if (currentProject === idx) return;
      currentProject = idx;

      // Update tabs
      tabBtns.forEach(b => b.classList.remove('active'));
      tabBtns[idx].classList.add('active');
      if (idx === 0) switcherInner.classList.remove('right');
      else switcherInner.classList.add('right');

      // Update panels
      panelEls.forEach((p, i) => { p.classList.toggle('active', i === idx); });

      // Update hero
      const proj = projects[idx];
      document.getElementById('heroBadge').textContent = proj.name;
      document.getElementById('heroTagline').textContent = proj.tagline;
      document.getElementById('heroDesc').textContent = proj.desc;
      proj.stats.forEach((s, i) => {
        document.getElementById('stat' + (i + 1)).textContent = s.num;
        document.getElementById('statLabel' + (i + 1)).textContent = s.label;
      });

      // Re-observe reveals in the new panel
      panelEls[idx].querySelectorAll('.reveal').forEach(el => {
        if (!el.classList.contains('visible')) obs.observe(el);
      });

      // Reset carousel to first slide
      if (idx === 1 && typeof ecoGoTo === 'function') ecoGoTo(0);

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.project);
        switchProject(idx);
      });
    });

    // Observe static reveal elements
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

    // Hide scroll prompt once user scrolls past 200px
    window.addEventListener('scroll', () => {
      const prompt = document.querySelector('.scroll-prompt');
      if (prompt) {
        if (window.scrollY > 200) prompt.style.opacity = '0';
        else prompt.style.opacity = '1';
      }
    }, { passive: true });

    // ===== STARFIELD =====
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [], scanLines = [], W, H, dpr;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.width = innerWidth * dpr; H = canvas.height = innerHeight * dpr;
      canvas.style.width = innerWidth + 'px'; canvas.style.height = innerHeight + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(dpr, dpr);
      initStars();
    }
    window.addEventListener('resize', resize);
    resize();

    function initStars() {
      const w = innerWidth, h = innerHeight;
      stars = []; scanLines = [];
      for (let i = 0; i < 100; i++)stars.push({
        x: Math.random() * w, y: Math.random() * h,
        r: Math.random() * 1.4 + 0.4,
        vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2,
        hue: Math.random() < 0.3 ? 160 : Math.random() < 0.5 ? 200 : 260
      });
      for (let i = 0; i < 5; i++)stars.push({
        x: Math.random() * w, y: Math.random() * h,
        r: 2.2 + Math.random() * 1.4,
        vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35,
        hue: 160, satellite: true
      });
      for (let i = 0; i < 3; i++)scanLines.push({
        y: Math.random() * h, speed: 0.25 + Math.random() * 0.55,
        alpha: 0.025 + Math.random() * 0.045, h: 36 + Math.random() * 56
      });
    }

    function draw() {
      const w = innerWidth, h = innerHeight;
      ctx.clearRect(0, 0, w, h);

      stars.forEach(s => {
        s.x += s.vx; s.y += s.vy;
        if (s.x < 0) s.x = w; if (s.x > w) s.x = 0;
        if (s.y < 0) s.y = h; if (s.y > h) s.y = 0;
      });

      const CONN = 130, MAXC = 3;
      for (let i = 0; i < stars.length; i++) {
        const a = stars[i]; let n = 0;
        for (let j = i + 1; j < stars.length && n < MAXC; j++) {
          const b = stars[j], dx = a.x - b.x, dy = a.y - b.y, d = Math.sqrt(dx * dx + dy * dy);
          if (d < CONN) {
            n++;
            const alpha = (1 - d / CONN) * 0.13;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `hsla(${(a.hue + b.hue) / 2},65%,58%,${alpha})`;
            ctx.lineWidth = 0.5; ctx.stroke();
          }
        }
      }

      stars.forEach(s => {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.satellite ? `hsla(${s.hue},80%,68%,0.85)` : `hsla(${s.hue},55%,78%,0.55)`;
        ctx.fill();
        if (s.satellite) {
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${s.hue},80%,68%,0.07)`; ctx.fill();
        }
      });

      scanLines.forEach(sl => {
        sl.y += sl.speed; if (sl.y > h + sl.h) sl.y = -sl.h;
        const g = ctx.createLinearGradient(0, sl.y - sl.h / 2, 0, sl.y + sl.h / 2);
        g.addColorStop(0, 'rgba(6,214,160,0)');
        g.addColorStop(0.5, `rgba(6,214,160,${sl.alpha})`);
        g.addColorStop(1, 'rgba(6,214,160,0)');
        ctx.fillStyle = g; ctx.fillRect(0, sl.y - sl.h / 2, w, sl.h);
      });

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    document.addEventListener('mousemove', e => {
      const mx = (e.clientX / innerWidth - 0.5) * 0.25, my = (e.clientY / innerHeight - 0.5) * 0.25;
      stars.forEach(s => { s.vx += mx * 0.004; s.vy += my * 0.004; });
    });
  </script>
</body>

</html>
